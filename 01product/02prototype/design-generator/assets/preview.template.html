<!DOCTYPE html>
<html lang="zh-CN" data-preview-source="unrendered-template">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PROJECT_NAME}} 预览模板</title>
  <style>
    :root {
      color-scheme: light;
      --page: #fff;
      --ink: #111;
      --muted: #555;
      --line: #d8d8d8;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--page); color: var(--ink); font: 15px/1.5 var(--font); }
    main { width: min(720px, calc(100vw - 32px)); border: 1px solid var(--line); padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 22px; line-height: 1.2; }
    p { margin: 0 0 12px; color: var(--muted); }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; color: var(--ink); }
  </style>
</head>
<body>
  <main>
    <h1>{{PROJECT_NAME}} 预览尚未渲染</h1>
    <p>这个文件是脚手架占位页，刻意不包含产品颜色、字体尺度、组件样例或页面模式。</p>
    <p>请先完成 <code>DESIGN.md</code>，再运行 <code>scripts/render_preview_from_design_md.py</code>，让预览从有证据支持的 tokens 和规则生成。</p>
  </main>
</body>
</html>
