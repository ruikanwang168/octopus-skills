<!DOCTYPE html>
<html lang="zh-CN" data-example-source="diagnostic" data-example-archetype="diagnostic" data-example-pattern="diagnostic" data-example-pattern-source="agent-required">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PROJECT_NAME}} 样例诊断页</title>
  <style>
    :root {
      color-scheme: light;
      --page: #fff;
      --ink: #111;
      --muted: #555;
      --line: #d8d8d8;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--page); color: var(--ink); font: 15px/1.5 var(--font); }
    main { width: min(720px, calc(100vw - 32px)); border: 1px solid var(--line); padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 22px; line-height: 1.2; }
    p { margin: 0 0 12px; color: var(--muted); }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; color: var(--ink); }
  </style>
</head>
<body>
  <main>
    <h1>{{PROJECT_NAME}} 的样例页需要由 Agent 生成</h1>
    <p>这个脚手架刻意不放入通用后台框架、表格、Hero 或组件库。最终样例必须由 Agent 根据 <code>DESIGN.md</code> 生成，再通过 <code>scripts/validate_design_folder.py</code> 校验。</p>
    <p>生成后的页面必须嵌入 <code>example-generation-input</code> 元数据，并在页面中可见展示选中的样例请求；不要把该请求写回 <code>DESIGN.md</code>。</p>
  </main>
  <script type="application/json" id="example-generation-input">{
    "source": "diagnostic",
    "userRequest": "",
    "selectedPageTemplate": "",
    "reason": "Agent 尚未生成 example.html。"
  }</script>
</body>
</html>
