<!DOCTYPE html>
<html lang="zh-CN" data-preview-source="unrendered-template" data-dark-strategy="Unrendered">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PROJECT_NAME}} 暗色预览模板</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #101010;
      --ink: #f2f2f2;
      --muted: #b8b8b8;
      --line: #3a3a3a;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--page); color: var(--ink); font: 15px/1.5 var(--font); }
    main { width: min(720px, calc(100vw - 32px)); border: 1px solid var(--line); padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 22px; line-height: 1.2; }
    p { margin: 0 0 12px; color: var(--muted); }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; color: var(--ink); }
  </style>
</head>
<body>
  <main>
    <h1>{{PROJECT_NAME}} 暗色预览尚未渲染</h1>
    <p>这个脚手架不声明产品拥有真实暗色模式。完成 <code>DESIGN.md</code> 后，它会根据暗色模式是真实存在、不可用，还是仅作为检查视图来替换。</p>
    <p>完成有证据支持的设计系统后，运行 <code>scripts/render_preview_from_design_md.py</code>。</p>
  </main>
</body>
</html>
