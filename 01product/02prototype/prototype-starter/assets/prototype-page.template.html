<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}} - {{FEATURE_NAME}} - {{PRODUCT_NAME}}</title>
  <link rel="stylesheet" href="../shared/css/tokens.css">
  <link rel="stylesheet" href="../shared/css/product-shell.css">
  <link rel="stylesheet" href="../shared/css/product-components.css">
  <link rel="stylesheet" href="../shared/css/product-patterns.css">
  <link rel="stylesheet" href="../shared/css/prototype-meta.css">
  <link rel="stylesheet" href="./assets/prototype.css">
</head>
<body>
  <div
    class="{{SHELL_ROOT_CLASS}}"
    data-feature="{{FEATURE_SLUG}}"
    data-page-key="{{PAGE_KEY}}"
    data-page-kind="{{PAGE_KIND}}"
    data-parent-page-key="{{PARENT_PAGE_KEY}}"
    data-surface="{{SURFACE}}"
    data-requirement-status="{{REQUIREMENT_STATUS}}"
    data-generation-mode="{{GENERATION_MODE}}"
    data-page-template="{{PAGE_TEMPLATE_ID}}"
    data-design-source-sha="{{DESIGN_SOURCE_SHA}}"
    data-design-runtime-sha="{{DESIGN_RUNTIME_SHA}}"
    data-design-contract-version="{{DESIGN_CONTRACT_VERSION}}"
    data-design-domains="{{DESIGN_DOMAINS}}"
    data-shared-refs="{{SHARED_REFS}}"
    data-design-profile-sha="{{DESIGN_PROFILE_SHA}}"
  >
    <header class="{{SHELL_HEADER_CLASS}}">
      <div class="{{SHELL_LOGO_CLASS}}">{{PRODUCT_NAME}}</div>
      <button type="button" class="{{SHELL_TOGGLE_CLASS}}" data-sidebar-toggle aria-label="展开侧栏" title="展开侧栏"><span class="product-icon" data-icon="menu"></span></button>
      <nav class="{{SHELL_TOP_MENU_CLASS}}" aria-label="一级导航">
{{NAV_ITEMS}}
      </nav>
      <div class="{{SHELL_HEADER_RIGHT_CLASS}}">
        <span class="user-entry"><span class="product-icon" data-icon="user"></span>{{USER_LABEL}}<span class="product-icon" data-icon="down"></span></span>
      </div>
    </header>

    <div class="{{SHELL_LAYOUT_CLASS}}">
      <aside class="{{SHELL_SIDEBAR_CLASS}}" aria-label="功能导航">
        <nav class="{{SHELL_SIDEBAR_NAV_CLASS}}">
{{SIDE_NAV_ITEMS}}
        </nav>
      </aside>

      <main class="{{SHELL_MAIN_CLASS}}">
        <div class="{{SHELL_TABS_CLASS}}" aria-label="页面标签">
          <span class="{{SHELL_TAB_ITEM_CLASS}} is-active">{{PAGE_TITLE}}</span>
        </div>

        <div class="{{SHELL_VIEW_CLASS}}">
          <section class="search-container" data-prototype-role="search-region" aria-label="筛选条件">
            <section class="{{FILTER_CLASS}}" aria-label="筛选条件">
              <div class="{{FILTER_GRID_CLASS}} is-collapsed">
{{FILTER_FIELDS}}
                <div class="{{FILTER_ACTIONS_CLASS}}">
{{FILTER_ACTIONS}}
                </div>
              </div>
            </section>
          </section>

          <section class="list-container {{SHELL_PANEL_CLASS}}" data-prototype-role="list-region" aria-label="{{PAGE_TITLE}}">
            <div class="{{SECTION_HEADER_CLASS}}">
              <div class="{{SECTION_TITLE_CLASS}}">{{PAGE_TITLE}}</div>
              <div class="{{SECTION_ACTIONS_CLASS}}">
{{PAGE_ACTIONS}}
              </div>
            </div>

            <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
{{TABLE_HEADERS}}
                </tr>
              </thead>
              <tbody>
{{SAMPLE_ROWS}}
              </tbody>
            </table>
            </div>

{{PAGINATION}}
          </section>

{{SCENARIO_SURFACE}}
        </div>
      </main>
    </div>
  </div>
  <script src="../shared/js/product-icons.js"></script>
  <script src="../shared/js/product-shell.js"></script>
  <script src="./assets/prototype.js"></script>
</body>
</html>
