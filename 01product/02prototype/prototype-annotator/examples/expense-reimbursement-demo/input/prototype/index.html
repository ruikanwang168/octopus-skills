<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能报销助手</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    main {
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    header {
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .subtitle {
      color: #64748b;
      margin: 0;
    }
    .layout {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
    }
    section,
    .status-bar {
      background: #ffffff;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 10px;
      font: inherit;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th,
    td {
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 8px;
    }
    .risk {
      padding: 10px 12px;
      border-radius: 6px;
      background: #fff7ed;
      color: #9a3412;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main data-ann="expense-application-page">
    <header>
      <h1 data-ann="page-title">智能报销助手</h1>
      <p class="subtitle">上传发票后自动识别、生成报销明细，并提交领导和财务审批。</p>
    </header>

    <div class="layout">
      <div>
        <section data-ann="invoice-upload-area">
          <h2>发票上传</h2>
          <label for="invoice-file">上传发票文件</label>
          <input id="invoice-file" name="invoiceFile" type="file" aria-label="上传发票文件">
          <p>支持 PDF、JPG、PNG，上传后进入 AI 识别队列。</p>
        </section>

        <section data-ann="trip-description">
          <h2>事项说明</h2>
          <label for="trip-purpose">报销事项说明</label>
          <textarea id="trip-purpose" name="tripPurpose" placeholder="请输入出差城市、日期和事由"></textarea>
        </section>
      </div>

      <div>
        <section data-ann="ai-result-area">
          <h2>AI识别结果</h2>
          <table>
            <thead>
              <tr>
                <th>字段</th>
                <th>识别值</th>
                <th>置信度</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>发票号码</td>
                <td>INV-2026-001</td>
                <td>98%</td>
              </tr>
              <tr>
                <td>金额</td>
                <td>1280.00</td>
                <td>96%</td>
              </tr>
            </tbody>
          </table>
        </section>

        <section data-ann="risk-check-area">
          <h2>风险校验结果</h2>
          <div class="risk">住宿标准疑似超出员工职级上限，需要人工确认。</div>
        </section>
      </div>
    </div>

    <div class="status-bar" data-ann="expense-status">
      <strong>状态：草稿</strong>
      <button data-ann="submit-approval">提交审批</button>
    </div>
  </main>
</body>
</html>
